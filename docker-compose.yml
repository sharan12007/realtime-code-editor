services:
  mongo:
    image: mongo:8
    container_name: collab-mongo
    restart: unless-stopped
    command: ["--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 8

  execution-service:
    build:
      context: .
      dockerfile: docker/execution-service.Dockerfile
    container_name: collab-execution
    restart: unless-stopped
    env_file:
      - execution-service/.env
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGIN=http://backend:4000
      - DOCKER_BIN=docker
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: collab-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/collab_editor
      - FRONTEND_ORIGIN=http://localhost:5173
      - EXECUTION_SERVICE_URL=http://execution-service:5001
    depends_on:
      mongo:
        condition: service_healthy
      execution-service:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: collab-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mongo_data:
